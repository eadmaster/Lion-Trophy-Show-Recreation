<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Lion Trophy Show Recreation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- from https://codepo8.github.io/css-fork-on-github-ribbon/      --> 
    <style>#forkongithub a{background:#000;color:#fff;text-decoration:none;font-family:arial,sans-serif;text-align:center;font-weight:bold;padding:5px 40px;font-size:1rem;line-height:2rem;position:relative;transition:0.5s;}#forkongithub a:hover{background:#c11;color:#fff;}#forkongithub a::before,#forkongithub a::after{content:"";width:100%;display:block;position:absolute;top:1px;left:0;height:1px;background:#fff;}#forkongithub a::after{bottom:1px;top:auto;}@media screen and (min-width:800px){#forkongithub{position:absolute;display:block;top:0;right:0;width:200px;overflow:hidden;height:200px;z-index:9999;}#forkongithub a{width:200px;position:absolute;top:60px;right:-60px;transform:rotate(45deg);-webkit-transform:rotate(45deg);-ms-transform:rotate(45deg);-moz-transform:rotate(45deg);-o-transform:rotate(45deg);box-shadow:4px 4px 10px rgba(0,0,0,0.8);}}</style><span id="forkongithub"><a href="https://github.com/eadmaster/Lion-Trophy-Show-Recreation">Fork me on GitHub</a></span>

    <div id="game-container">
        <video id="video-player" playsinline></video>

        <div id="start-screen">
            <div class="start-content">
                <p class="game-subtitle">Recreation Project by eadmaster</p>
                <button id="start-btn" class="glow-button">START</button>
            </div>
        </div>


        <div id="qte-overlay" class="hidden">
            <div id="qte-prompt">PRESS <span id="target-number">5</span></div>

            <div id="qte-keys" class="qte-keys hidden"></div>
        </div>

        <div class="button-grid">
            <div class="qte-btn" id="btn-7">7</div>
            <div class="qte-btn" id="btn-8">8</div>
            <div class="qte-btn" id="btn-9">9</div>
            <div class="qte-btn" id="btn-4">4</div>
            <div class="qte-btn" id="btn-5">5</div>
            <div class="qte-btn" id="btn-6">6</div>
            <div class="qte-btn" id="btn-1">1</div>
            <div class="qte-btn" id="btn-2">2</div>
            <div class="qte-btn" id="btn-3">3</div>

            <div class="qte-btn" id="btn-star">*</div>
            <div class="qte-btn" id="btn-0">0</div>
            <div class="qte-btn" id="btn-hash">#</div>
        </div>

        <div id="lives-container"></div>
        <input type="text" id="player-name-input" value="PLAYER 1" spellcheck="false" />
        <div id="score-counter">0</div>
    </div>

    <script src="game.js"></script>
</body>

</html>
